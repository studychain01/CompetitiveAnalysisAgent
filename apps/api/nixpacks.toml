# Railway / Nixpacks: set service Root Directory to ``apps/api`` so this file is used.
# Ensures the package + deps install before start (fixes ``uvicorn: command not found``).

[phases.install]
cmds = ["pip install --no-cache-dir ."]

[start]
cmd = "python -m uvicorn battlescope_api.main:app --host 0.0.0.0 --port $PORT"
