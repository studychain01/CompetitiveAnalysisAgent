# Nixpacks (optional). For Railway, the repo-root ``railway.json`` is what actually
# overrides the dashboard start command unless you set Config path to ``/apps/api/railway.json``.

[phases.install]
cmds = ["pip install --no-cache-dir ."]

[start]
cmd = "python -m uvicorn battlescope_api.main:app --host 0.0.0.0 --port $PORT"
